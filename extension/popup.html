<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Clipship</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1a1a1a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --ok: #16a34a;
      --err: #dc2626;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --fg: #f5f5f5;
        --muted: #9ca3af;
        --border: #374151;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --ok: #22c55e;
        --err: #ef4444;
      }
    }
    body {
      width: 320px;
      margin: 0;
      padding: 14px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--fg);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
    }
    .gear {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .gear:hover { background: var(--border); }
    button.primary {
      width: 100%;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 500;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button.primary:hover { background: var(--accent-hover); }
    button.primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 7px 9px;
      margin-bottom: 10px;
      font-size: 12px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 5px;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .row button {
      flex: 1;
      padding: 7px 10px;
      font-size: 12px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--fg);
      cursor: pointer;
    }
    .row button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      min-height: 16px;
    }
    #status.ok { color: var(--ok); }
    #status.err { color: var(--err); }
    .hidden { display: none !important; }
    .hint {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <h1>Clipship</h1>
    <button class="gear" id="toggle-config" title="Settings">⚙</button>
  </header>

  <div id="clip-view">
    <button class="primary" id="clip-btn">Clip this page</button>
    <div id="status"></div>
  </div>

  <div id="config-view" class="hidden">
    <label for="endpoint">Endpoint URL</label>
    <input type="url" id="endpoint" placeholder="https://example.com/clip" autocomplete="off" spellcheck="false">

    <label for="secret">HMAC secret</label>
    <input type="password" id="secret" placeholder="hex-encoded shared secret" autocomplete="off" spellcheck="false">
    <div class="hint">Must match SECRET_KEY in your server config.</div>

    <div class="row">
      <button id="cancel-btn">Cancel</button>
      <button class="primary" id="save-btn">Save</button>
    </div>
    <div id="config-status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
